<section id="book-your-table">
    <h3 class="section-intro-header">reservation</h3>
    <h1 class="section-header">book your table</h1>
    <form class="mx-auto">
        <div class="form-group">
            <input type="text" class="form-control text-capitalize" id="name" aria-describedby="name"
                placeholder="name">
        </div>
        <div class="form-group">
            <input type="text" class="form-control text-capitalize" id="date" aria-describedby="name"
                placeholder="date">
        </div>
        <div class="form-group">
            <input type="text" class="form-control text-capitalize" id="people" aria-describedby="people"
                placeholder="people">
        </div>
        <div class="form-group">
            <input type="text" class="form-control text-capitalize" id="email" aria-describedby="email"
                placeholder="email">
        </div>
        <div class="form-group">
            <input type="text" class="form-control text-capitalize" id="time" aria-describedby="time"
                placeholder="time">
        </div>
        <div class="dd-btn filled-btn d-flex justify-content-center align-items-center">
            <span>find a table</span>
        </div>
    </form>
</section>
